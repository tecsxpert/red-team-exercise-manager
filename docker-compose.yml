version: '3.8'

services:

  app:
    build: ./backend
    container_name: redteam-app
    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/redteam
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8
    container_name: redteam-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: redteam
    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redteam-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: redteam-nginx
    ports:
      - "80:80"

  adminer:
    image: adminer
    container_name: redteam-adminer
    ports:
      - "8081:8080"